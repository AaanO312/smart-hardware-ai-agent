# 一键启动：docker compose up -d
# 智能硬件售后 AI Agent — FastAPI 后端 + Streamlit 前端

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.compose
    container_name: hardware-api
    command: uvicorn api:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
    volumes:
      - .:/app
      - chroma_data:/app/chroma_db   # Chroma 向量库持久化
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.compose
    container_name: hardware-streamlit
    command: streamlit run app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
    volumes:
      - .:/app
      - chroma_data:/app/chroma_db
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  chroma_data:   # 持久化向量库，容器删了数据还在
